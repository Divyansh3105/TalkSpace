<!doctype html>
<html lang="en">

<head>
  <!-- Charset & Viewport -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>TalkSpace – Connect, Chat & Collaborate</title>
  <meta name="title" content="TalkSpace – Connect, Chat & Collaborate" />
  <meta name="description"
    content="TalkSpace is a real-time chat platform that lets you connect with friends, create group conversations, and collaborate seamlessly. Fast, secure, and always online." />
  <meta name="keywords"
    content="TalkSpace, chat app, real-time messaging, group chat, instant messaging, connect with friends, collaboration, online chat" />
  <meta name="author" content="TalkSpace" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="revisit-after" content="7 days" />
  <meta name="rating" content="general" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://talkspace.app/" />

  <!-- Favicon & App Icons -->
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Theme Color (browser UI color on mobile) -->
  <meta name="theme-color" content="#6c63ff" />
  <meta name="msapplication-TileColor" content="#6c63ff" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://talkspace.app/" />
  <meta property="og:title" content="TalkSpace – Connect, Chat & Collaborate" />
  <meta property="og:description"
    content="TalkSpace is a real-time chat platform that lets you connect with friends, create group conversations, and collaborate seamlessly." />
  <meta property="og:site_name" content="TalkSpace" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TalkSpace – Connect, Chat & Collaborate" />
  <meta name="twitter:description"
    content="TalkSpace is a real-time chat platform that lets you connect with friends, create group conversations, and collaborate seamlessly." />
  <meta name="twitter:site" content="@talkspace" />
  <meta name="twitter:creator" content="@talkspace" />

  <!-- PWA / Mobile Web App -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TalkSpace" />
  <meta name="application-name" content="TalkSpace" />

  <!-- Security -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
